name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python 3.12 tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_ENV: test
      SECRET_KEY: ci-only-signing-key-with-at-least-32-characters
      COOKIE_SECURE: "false"
      SEED_DEMO_DATA: "false"
      DATABASE_URL: sqlite:////tmp/eportfolio-ci.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Verify application import
        run: python -B -c "from main import app; print(app.title)"

      - name: Verify migrations and schema metadata
        run: |
          python -m alembic upgrade head
          python -m alembic current
          python -m alembic check

      - name: Run tests with coverage
        run: python -m pytest
