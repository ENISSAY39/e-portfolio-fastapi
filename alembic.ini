[alembic]
# Store migration environment files relative to this configuration file.
script_location = %(here)s/migrations
# Make repository modules importable when Alembic is launched from the root.
prepend_sys_path = .
# Use the host operating system's path-list separator.
path_separator = os

# The database URL is intentionally not duplicated here. migrations/env.py uses
# the same engine and environment variables as the FastAPI application.

[post_write_hooks]
# No formatter hook is configured; generated revisions must be reviewed before
# they are committed or applied.

[loggers]
# Declare the root, SQLAlchemy, and Alembic logging channels used below.
keys = root,sqlalchemy,alembic

[handlers]
# Send migration output through one console handler.
keys = console

[formatters]
# Keep CLI migration logs compact and readable.
keys = generic

[logger_root]
# Suppress routine third-party output unless it is a warning or error.
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
# Avoid logging SQL statements and potentially sensitive bound data by default.
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# Alembic lifecycle messages remain visible during upgrades and generation.
level = INFO
handlers =
qualname = alembic

[handler_console]
# Alembic logs to stderr so generated SQL can remain separate on stdout.
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# Include severity and logger name without verbose source metadata.
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
