<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>e-portfolio</title>

    <link rel="stylesheet" href="/static/base.css">
    <style>
        body {
            margin: 0;
            background-color: #e5e7eb;
            font-family: Arial, sans-serif;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        .header {
            width: 100%;
            box-sizing: border-box;

            background-color: #2563eb;
            padding: 30px 40px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            color: white;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .header-buttons a button {
            background-color: white;
            color: #2563eb;

            border: none;
            padding: 12px 20px;

            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;

            cursor: pointer;

            transition: 0.2s;
        }

        .header-buttons a button:hover {
            opacity: 0.85;
        }

        /* SEARCH BAR */
        .search-form {
            margin-top: 40px;

            display: flex;
            gap: 12px;
        }

        .search-form input {
            width: 350px;

            padding: 14px;

            border: 1px solid #ccc;
            border-radius: 10px;

            font-size: 16px;
        }

        .search-form button {
            background-color: #2563eb;
            color: white;

            border: none;
            padding: 14px 22px;

            border-radius: 10px;

            font-weight: bold;
            cursor: pointer;

            transition: 0.2s;
        }

        .search-form button:hover {
            opacity: 0.9;
        }

        /* CONTENT */
        .container {
            margin-top: 40px;

            width: 70%;
            max-width: 900px;
        }

        .container h3 {
            color: #2563eb;
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
        }

        /* PORTFOLIO LIST */
        .portfolio-list {
            list-style: none;
            padding: 0;
        }

        .portfolio-list li {
            background-color: white;

            padding: 25px;
            margin-bottom: 20px;

            border-radius: 14px;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .portfolio-list strong {
            font-size: 22px;
            color: #2563eb;
        }

        .portfolio-list a {
            display: inline-block;

            margin-top: 15px;

            background-color: #2563eb;
            color: white;

            padding: 10px 18px;

            border-radius: 8px;

            text-decoration: none;
            font-weight: bold;

            transition: 0.2s;
        }

        .portfolio-list a:hover {
            opacity: 0.9;
        }
    </style>

</head>

<body>

    <!-- HEADER -->
    <div class="header">

        <h1>Welcome to Public e-Portfolios</h1>

        <div class="header-buttons">

            <a href="/login">
                <button type="button">Login</button>
            </a>

            <a href="/create_user">
                <button type="button">Sign Up</button>
            </a>

        </div>

    </div>

    <!-- SEARCH -->
    <form action="/search" method="get" class="search-form">

        <input type="text" name="query" placeholder="Search a portfolio..." value="{{ query if query else '' }}">

        <button type="submit">
            Search
        </button>

    </form>

    <!-- CONTENT -->
    <div class="container">

        <h3>
            Here you can find the available portfolios.
            Click on "View portfolio" to see each profile.
        </h3>

        <ul class="portfolio-list">

            {% for user in users %}

            <li>

                <strong>
                    {{ user.name }}
                </strong>

                <br>

                <a href="/portfolio/{{ user.id }}">
                    View portfolio
                </a>

            </li>

            {% endfor %}

        </ul>

    </div>

</body>

</html>
