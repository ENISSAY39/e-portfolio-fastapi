<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>e-portfolio</title>

    <link rel="stylesheet" href="{{ url_for('static', path='base.css') }}">

    <style>
        .header {
            background-color: #2563eb;
            padding: 18px 40px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .header-buttons a button {
            background-color: white;
            color: #2563eb;

            border: none;
            padding: 10px 18px;

            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.2s;
        }

        .header-buttons a button:hover {
            opacity: 0.85;
        }

        .portfolio-list {
            margin-top: 30px;
        }

        .portfolio-list li {
            margin-bottom: 20px;
        }
    </style>

</head>

<body>


    <!-- HEADER -->

    <div class="header">

        <h1>Welcome to Public e-Portfolios</h1>

        <div class="header-buttons">

            <a href="/login">
                <button type="button">Login</button>
            </a>

            <a href="/create_user">
                <button type="button">Sign Up</button>
            </a>

        </div>

    </div>
    <form action="/search" method="get">

        <input type="text" name="query" placeholder="Search a portfolio..." value="{{ query if query else '' }}">

        <button type="submit">
            Search
        </button>

    </form>

    <!-- CONTENT -->

    <div class="container">


        <h3>
            Here you can find the available portfolios. Click on "View portfolio" to see the content of each portfolio:
        </h3>

        <ul class="portfolio-list">

            {% for user in users %}

            <li>

                <strong>
                    {{ user.name }}
                </strong>

                <br><br>

                <a href="/portfolio/{{ user.id }}">
                    View portfolio
                </a>

            </li>

            {% endfor %}

        </ul>

    </div>

</body>

</html>
