<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Éducation</title>
    <link rel="stylesheet" href="/static/base.css">
</head>

<body>

    <div class="container">

        <h1>
            {% if edu %}
            Modify an education
            {% else %}
            Add an education
            {% endif %}
        </h1>

        <form action="{% if edu %}/profil/education/edit/{{ edu.id }}{% else %}/profil/education{% endif %}"
            method="post">


            <label>School :</label>
            <input type="text" name="school_name" value="{{ edu.school_name if edu else '' }}" required>


            <label>Start date :</label>
            <input type="date" name="date_start" value="{{ edu.date_start.strftime('%Y-%m-%d') if edu else '' }}"
                required>

            <label>End date :</label>
            <input type="date" name="date_end" value="{{ edu.date_end.strftime('%Y-%m-%d') if edu else '' }}" required>

            <label>Description :</label>
            <textarea name="description" rows="3" required>{{ edu.description if edu else '' }}</textarea>

            <label>Major :</label>
            <input type="text" name="major" value="{{ edu.major if edu else '' }}" required>


            <button type="submit">
                {% if edu %}Update{% else %}Add{% endif %}
            </button>

        </form>

        <br>

        <a href="/profil">
            <button type="button">Back</button>
        </a>

    </div>

</body>

</html>
