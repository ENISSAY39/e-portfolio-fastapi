<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Sign In</title>

    <link rel="stylesheet" href="/static/login_style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            flex-direction: column;
            /* correction */
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
            /* espace entre le texte et le formulaire */
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #007BFF;
        }

        h2 {
            margin-bottom: 20px;
            color: #007BFF;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            background: #007BFF;
            color: white;
        }

        button:hover {
            background: #0056b3;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }

        .footer a {
            color: #007BFF;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Welcome to Public e-Portfolios</h1>
        <div class="header-buttons">
            <a href="/">
                <button type="button">Home</button>
            </a>
        </div>
    </div>

    <!-- TITLE -->


    <!-- LOGIN -->
    <div class="login-container">

        <h2>Sign In</h2>

        <form action="/login" method="post">

            <input type="email" name="mail" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">
                Connect
            </button>

        </form>

        <div class="footer">
            you don't have an account?
            <a href="/create_user">Sign up</a>
        </div>

    </div>

</body>

</html>
